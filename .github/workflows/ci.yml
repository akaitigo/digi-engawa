name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npx biome check .
      - run: npx tsc --noEmit
      - run: npx vitest run --passWithNoTests

  lint-and-test-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: api/go.sum
      - run: go test -v -race -count=1 ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          working-directory: api

  build:
    runs-on: ubuntu-latest
    needs: [lint-and-test-web, lint-and-test-api]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: api/go.sum
      - run: cd web && npm ci && npx next build
      - run: cd api && go build -trimpath -ldflags "-s -w" -o bin/server ./cmd/server
